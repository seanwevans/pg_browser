---
name: CI

'on':
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: ['16', '17']
    env:
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL ${{ matrix.pg }}
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo tee /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc >/dev/null
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc]" \
            "https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y \
            "postgresql-${{ matrix.pg }}" \
            "postgresql-client-${{ matrix.pg }}" \
            "postgresql-server-dev-${{ matrix.pg }}"

      - name: Start a single cluster on port 5432
        run: |
          # Drop any pre-existing clusters so the target version owns 5432.
          # dblink (used by the concurrent tests) connects back over the default
          # socket on 5432, so the cluster must listen there.
          sudo systemctl stop postgresql || true
          pg_lsclusters -h | awk '{print $1, $2}' | while read -r ver name; do
            sudo pg_dropcluster --stop "$ver" "$name" || true
          done
          sudo pg_createcluster "${{ matrix.pg }}" main -- \
            --auth-local=peer --auth-host=scram-sha-256
          sudo pg_ctlcluster "${{ matrix.pg }}" main start
          for _ in $(seq 1 30); do
            pg_isready -h /var/run/postgresql -p 5432 && break
            sleep 1
          done
          sudo -u postgres psql -p 5432 \
            -c "ALTER USER postgres PASSWORD 'postgres';"

      - name: Golden suite (pg_regress, fresh install)
        run: |
          export PATH="/usr/lib/postgresql/${{ matrix.pg }}/bin:$PATH"
          tests/run_regress.sh

      - name: Transactional + integration tests
        run: |
          export PATH="/usr/lib/postgresql/${{ matrix.pg }}/bin:$PATH"
          tests/run.sh
          tests/test_session_open.sh

      - name: Migration-order check (every sql file in sequence)
        run: |
          export PATH="/usr/lib/postgresql/${{ matrix.pg }}/bin:$PATH"
          tests/run_migrations.sh
